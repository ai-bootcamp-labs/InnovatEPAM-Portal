name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  WORKING_DIR: InnovatEPAM-Portal

jobs:
  backend:
    name: Backend (.NET 8)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: innovatepam
          POSTGRES_USER: innovatepam
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U innovatepam -d innovatepam"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore

      - name: Format check
        run: dotnet format --verify-no-changes --no-restore

      - name: Build (warnings as errors)
        run: dotnet build --no-restore -warnaserror

      - name: Test
        run: dotnet test --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Vulnerability scan
        run: |
          set -euo pipefail
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln.txt
          if grep -E "(Critical|High)" vuln.txt; then
            echo "::error::Critical or High vulnerabilities found"
            exit 1
          fi

  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test

      - run: npm run build

      - name: NPM audit (production)
        run: npm audit --production --audit-level=high
