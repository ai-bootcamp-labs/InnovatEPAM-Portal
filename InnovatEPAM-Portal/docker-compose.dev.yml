services:
  postgres:
    image: postgres:15
    container_name: innovatepam-pg
    environment:
      POSTGRES_DB: innovatepam
      POSTGRES_USER: innovatepam
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5433:5432"
    volumes:
      - innovatepam-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U innovatepam -d innovatepam"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  innovatepam-pg-data:
